<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview — MaxiCAD Modern (Dark Gold) Standalone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{--bg:#0b0b0b;--surface:#0f0f10;--muted:#cfcfcf;--text:#f3f3f3;--gold:#D4AF37}
    body{background:var(--bg);color:var(--text);font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;margin:0}
    .brand-mark{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#f7d57a);display:flex;align-items:center;justify-content:center;color:#0b0b0b;font-weight:700}
    .hero-modern{padding:3rem 0;background:linear-gradient(180deg,rgba(212,175,55,0.03),transparent)}
    .modern-preview{max-height:320px;width:100%;height:auto}
    .bg-surface{background:linear-gradient(180deg,var(--surface),#0b0b0b);border:1px solid rgba(255,255,255,0.03);}
    .btn-gold{background:var(--gold);color:#0b0b0b;border:none;box-shadow:0 6px 18px rgba(212,175,55,0.12);}
    a.text-gold{color:var(--gold)}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-transparent">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <div class="brand-mark">MC</div>
        <div class="ms-2 d-none d-sm-block">
          <div class="h6 mb-0 text-light">MaxiCAD</div>
          <small class="text-muted">Valida IFC</small>
        </div>
      </a>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <h5 class="text-light mb-3">Preview — MaxiCAD Modern (Dark Gold)</h5>
      <div class="ratio ratio-16x9 rounded shadow-sm overflow-hidden" style="background:var(--bg);">
        <iframe src="/docs/modern-bootstrap/index.html" style="border:0;width:100%;height:100%;" title="Preview"></iframe>
      </div>
      <p class="mt-3 text-muted small">Se o iframe não abrir no seu dispositivo, abra direto: <a class="text-gold" href="https://cdn.jsdelivr.net/gh/Maxicad/Valida-IFC-By-Codex@main/docs/modern-bootstrap/index.html" target="_blank">Abrir página moderna</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
